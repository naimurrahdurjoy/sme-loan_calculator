<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BRAC Bank - SME Loan Application</title>
  <!-- Tailwind CDN for quick responsive layout -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50">
  <header class="bg-white border-b">
    <div class="container flex items-center justify-between py-4">
      <img src="brac-bank-logo.png" alt="BRAC Bank" class="h-10" onerror="this.onerror=null;this.src='brac-bank-logo.svg'">
      <nav class="text-sm text-blue-800">
        <a href="index.html" class="mr-4">Calculator</a>
        <a href="#">SME Loan</a>
      </nav>
    </div>
  </header>

  <main class="container py-8">
    <h1 class="text-2xl font-semibold text-blue-900 mb-6">SME Loan Application Form</h1>

    <form id="smeForm" class="bg-white p-6 rounded-lg shadow-sm max-w-3xl mx-auto" novalidate>

      <!-- Full Name -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-blue-900">Full Name <span class="text-gray-600">(পুরো নাম)</span></label>
        <input name="fullName" id="fullName" type="text" placeholder="Enter Your Name" required class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
      </div>

      <!-- DOB -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-blue-900">Date of Birth <span class="text-gray-600">(জন্ম তারিখ)</span></label>
        <input name="dob" id="dob" type="date" placeholder="Date of birth" required class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
      </div>

      <!-- Address row: Apartment, Road -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-blue-900">Apartment/House No. <span class="text-gray-600">(অ্যাপার্টমেন্ট / বাড়ি নম্বর)</span></label>
          <input name="houseNo" id="houseNo" type="text" placeholder="Apt & House No" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
        </div>
        <div>
          <label class="block text-sm font-medium text-blue-900">Road No. <span class="text-gray-600">(রোড নম্বর)</span></label>
          <input name="roadNo" id="roadNo" type="text" placeholder="Road No" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
        </div>
      </div>

      <!-- Area & City -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-blue-900">Area / Location <span class="text-gray-600">(ঠিকানা)</span></label>
        <input name="area" id="area" type="text" placeholder="Enter Your Area / Location" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-blue-900">City <span class="text-gray-600">(শহর)</span></label>
          <input name="city" id="city" type="text" placeholder="Enter Your City" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
        </div>
        <div>
          <label class="block text-sm font-medium text-blue-900">Country <span class="text-gray-600">(দেশ)</span></label>
          <select name="country" id="country" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200">
            <option>Bangladesh</option>
            <option>India</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <!-- Branch, Contact, Email -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-blue-900">Nearest BRAC Bank Branch <span class="text-gray-600">(নিকটতম ব্র্যাক ব্যাংক শাখা)</span></label>
          <select name="branch" id="branch" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200">
            <option value="">Select Your Nearest Branch</option>
            <option>Gulshan</option>
            <option>Dhanmondi</option>
            <option>Mirpur</option>
            <option>Banani</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-blue-900">Contact Number <span class="text-gray-600">(যোগাযোগের নম্বর)</span></label>
          <input name="phone" id="phone" type="tel" placeholder="01710000000" required class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-blue-900">Your Email <span class="text-gray-600">(ইমেইল)</span></label>
          <input name="email" id="email" type="email" placeholder="example@gmail.com" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
        </div>
        <div>
          <label class="block text-sm font-medium text-blue-900">Profession <span class="text-gray-600">(পেশা)</span></label>
          <select name="profession" id="profession" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200">
            <option value="">Select</option>
            <option>Salaried</option>
            <option>Business Owner</option>
            <option>Self-Employed</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <!-- Monthly income other sources -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-blue-900">Monthly income from other sources if any <span class="text-gray-600">(অন্যান্য উৎস থেকে মাসিক আয়, যদি থাকে)</span></label>
        <select name="otherIncome" id="otherIncome" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200">
          <option value="">Select</option>
          <option value="0">None</option>
          <option value="<10000">Less than 10,000</option>
          <option value="10000-50000">10,000 - 50,000</option>
          <option value=">50000">More than 50,000</option>
        </select>
      </div>

      <!-- Requested Loan Amount & Loan Type & Tenure -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-blue-900">Requested Loan Amount <span class="text-gray-600">(লোনের পরিমাণ)</span></label>
          <input name="requestedAmount" id="requestedAmount" type="number" placeholder="0" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
        </div>
        <div>
          <label class="block text-sm font-medium text-blue-900">What Type of Loan do you need? <span class="text-gray-600">(আপনার কোন ধরণের লোন প্রয়োজন?)</span></label>
          <select name="loanType" id="loanType" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200">
            <option>SME Loan</option>
            <option>Home Loan</option>
            <option>Personal Loan</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-blue-900">Tenure of your loan Years <span class="text-gray-600">(লোনের মেয়াদ)</span></label>
          <input name="tenure" id="tenure" type="number" min="1" max="20" placeholder="Years" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200" />
        </div>
      </div>

      <!-- Existing loan -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-blue-900">Do you have any existing loan? <span class="text-gray-600">(আপনার কি কোনও বিদ্যমান লোন আছে?)</span></label>
        <select name="existingLoan" id="existingLoan" class="mt-1 block w-full rounded-md border-gray-200 shadow-sm focus:border-blue-500 focus:ring-blue-200">
          <option value="">Select</option>
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </div>

      <!-- Declaration -->
      <div class="mb-6">
        <label class="inline-flex items-start">
          <input id="consent" name="consent" type="checkbox" class="h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 mt-1" />
          <span class="ml-3 text-sm text-gray-700">I hereby declare that all the information provided above is true and correct to the best of my knowledge. I understand and agree that if any of the information is found to be false or incorrect, my loan application may be rejected. I also consent to sharing my information with BRAC Bank and authorize BRAC Bank to contact me regarding this application. I agree to comply with the company's applicable policies.</span>
        </label>
      </div>

      <div class="text-center">
        <button id="submitBtn" type="submit" class="inline-flex items-center px-8 py-3 rounded-full bg-gradient-to-r from-blue-800 to-blue-600 text-white font-semibold hover:brightness-105">Submit</button>
      </div>

      <p id="formMessage" class="text-center mt-4 text-sm text-red-600 hidden"></p>
    </form>
  </main>

  <script src="form.js"></script>
</body>
</html>
